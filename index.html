<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salt | Abdul</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/x-icon" href="./public/salt.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a class="navbar-brand" href="/">
          <img src="./public/salt.png" alt="salt logo" width="30" height="30" />
          <strong>salt</strong>
        </a>
      </div>
    </nav>

    <main class="container">
      <div class="hero">
        <h1 class="display-4 fw-bold lh-1 text-body-emphasis">Hi, I'm Salt</h1>
        <p class="lead">
          A software developer passionate about building tools for anyone to
          use.
        </p>
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
          <a
            href="mailto:hi@slimy.lol"
            class="btn btn-primary btn-lg"
            role="button"
            >Let's Talk</a
          >
          <a
            href="https://blog.byaq.tech"
            class="btn btn-outline-secondary btn-lg"
            role="button"
            >Read My Blog</a
          >
        </div>
      </div>

      <div class="projects-section">
        <h2 class="text-center mb-5 fw-bold">My Projects</h2>
        <div class="row g-4 justify-content-center">
          <div class="col-lg-4 col-md-6">
            <div class="project-card">
              <img src="./public/5a smaller.png" alt="fifthace logo" />
              <h3 class="fs-4 text-body-emphasis">Fifthace</h3>
              <p>A collection of fun and useful tools for everyday tasks.</p>
              <span class="coming-soon">Coming Soon</span>
            </div>
          </div>
          <div class="col-lg-4 col-md-6">
            <div class="project-card">
              <img src="./public/ov small.png" alt="ov logo" />
              <h3 class="fs-4 text-body-emphasis">ov</h3>
              <p>Exploring the future of tools for online education.</p>
              <span class="coming-soon">Coming Soon</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
